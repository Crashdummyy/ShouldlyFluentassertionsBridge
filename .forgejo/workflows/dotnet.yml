on:
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - "master"


jobs:
  ci:
    runs-on: host
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile csproj
        run: |
          dotnet build "./src/ShouldlyFluentassertionsBridge.csproj" -c Release

      - name: PacknPush
        if: ${{ github.event_name == 'push' }}
        run: |
          dotnet pack "./src/ShouldlyFluentassertionsBridge.csproj" -c Release -p:PackageVersion="${{ github.ref_name }}" -p:PackageID="Codepotatoes.ShouldlyFluentassertionsBridge" -o .
          cp "/home/crashdummy/.nuget/NuGet/NuGet.Config" .
          dotnet nuget push *.nupkg -s codepotatoes -k "${{ secrets.NUGET_API_KEY }}"
          dotnet nuget push *.nupkg -s nuget.org -k "${{ secrets.NUGETORG_API_KEY }}"

